name: Render Shorts Video

on:
  workflow_dispatch:
    inputs:
      job_id:
        required: true
      image_ids:
        required: true
      audio_id:
        required: false
      output_folder_id:
        required: true

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install google-api-python-client google-auth

      - name: Prepare folders
        run: |
          mkdir -p input clips output
          echo '${{ secrets.GCP_SERVICE_ACCOUNT }}' > service-account.json

      - name: Download images and audio from Google Drive
        run: |
          python - <<'PY'
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaIoBaseDownload
          import io, os

          SCOPES = ["https://www.googleapis.com/auth/drive"]
          creds = service_account.Credentials.from_service_account_file(
              "service-account.json", scopes=SCOPES
          )
          drive = build("drive", "v3", credentials=creds)

          image_ids = "${{ github.event.inputs.image_ids }}".split(",")
          image_ids = [x.strip() for x in image_ids if x.strip()]

          def download(file_id, path):
              request = drive.files().get_media(fileId=file_id)
              fh = io.FileIO(path, "wb")
              downloader = MediaIoBaseDownload(fh, request)
              done = False
              while not done:
                  status, done = downloader.next_chunk()

          for i, file_id in enumerate(image_ids, start=1):
              download(file_id, f"input/scene{i}.png")

          audio_id = "${{ github.event.inputs.audio_id }}"
          if audio_id.strip():
              download(audio_id.strip(), "input/audio.mp3")

          with open("image_count.txt", "w") as f:
              f.write(str(len(image_ids)))
          PY

      - name: Create silent audio if missing
        run: |
          IMAGE_COUNT=$(cat image_count.txt)
          DURATION=$((IMAGE_COUNT * 3))

          if [ ! -f input/audio.mp3 ]; then
            ffmpeg -f lavfi -i anullsrc=r=44100:cl=mono -t "$DURATION" -q:a 9 -acodec libmp3lame input/audio.mp3
          fi

      - name: Create image clips
        run: |
          IMAGE_COUNT=$(cat image_count.txt)

          for i in $(seq 1 $IMAGE_COUNT); do
            ffmpeg -y \
              -loop 1 -t 3 -i "input/scene${i}.png" \
              -vf "scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,setsar=1" \
              -r 30 \
              -c:v libx264 \
              -pix_fmt yuv420p \
              "clips/clip${i}.mp4"

            echo "file 'clip${i}.mp4'" >> clips/list.txt
          done

      - name: Concatenate clips and add audio
        run: |
          ffmpeg -y \
            -f concat -safe 0 -i clips/list.txt \
            -i input/audio.mp3 \
            -map 0:v -map 1:a \
            -shortest \
            -c:v libx264 \
            -pix_fmt yuv420p \
            -c:a aac \
            output/short_${{ github.event.inputs.job_id }}.mp4

      - name: Upload video to Google Drive
        run: |
          python - <<'PY'
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          SCOPES = ["https://www.googleapis.com/auth/drive"]
          creds = service_account.Credentials.from_service_account_file(
              "service-account.json", scopes=SCOPES
          )
          drive = build("drive", "v3", credentials=creds)

          job_id = "${{ github.event.inputs.job_id }}"
          folder_id = "${{ github.event.inputs.output_folder_id }}"
          file_path = f"output/short_{job_id}.mp4"

          metadata = {
              "name": f"short_{job_id}.mp4",
              "parents": [folder_id]
          }

          media = MediaFileUpload(file_path, mimetype="video/mp4", resumable=True)
          uploaded = drive.files().create(
              body=metadata,
              media_body=media,
              fields="id,name,webViewLink"
          ).execute()

          print(uploaded)
          PY
