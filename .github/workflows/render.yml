name: Render Shorts Video

on:
  workflow_dispatch:
    inputs:
      job_id:
        required: true
      thumbnail_title:
        required: true
      thumbnail_subtitle:
        required: true

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-cjk fonts-nanum
          pip install google-api-python-client google-auth pillow

      - name: Prepare folders
        run: |
          mkdir -p input clips output
          echo '${{ secrets.GCP_SERVICE_ACCOUNT }}' > service-account.json

      - name: Download images from Google Drive temp
        run: |
          python - <<'PY'
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaIoBaseDownload
          import io, re, time

          JOB_ID = "${{ github.event.inputs.job_id }}"
          TEMP_FOLDER_ID = "${{ secrets.TEMP_FOLDER_ID }}"

          SCOPES = ["https://www.googleapis.com/auth/drive"]
          creds = service_account.Credentials.from_service_account_file("service-account.json", scopes=SCOPES)
          drive = build("drive", "v3", credentials=creds)

          query = f"'{TEMP_FOLDER_ID}' in parents and trashed=false and name contains '{JOB_ID}_scene_'"

          files = []
          for attempt in range(1, 7):
              results = drive.files().list(q=query, fields="files(id,name)", pageSize=1000).execute()
              files = results.get("files", [])
              if files:
                  print(f"Found {len(files)} image files on attempt {attempt}")
                  break
              print(f"No image files found yet. Retry {attempt}/6...")
              time.sleep(5)

          if not files:
              raise Exception(f"No scene images found for job_id={JOB_ID}")

          def scene_number(name):
              m = re.search(r"_scene_(\d+)", name)
              return int(m.group(1)) if m else 999999

          files.sort(key=lambda f: scene_number(f["name"]))

          for idx, f in enumerate(files, start=1):
              path = f"input/scene{idx}.png"
              print(f"Downloading image: {f['name']} -> {path}")

              request = drive.files().get_media(fileId=f["id"])
              fh = io.FileIO(path, "wb")
              downloader = MediaIoBaseDownload(fh, request)

              done = False
              while not done:
                  status, done = downloader.next_chunk()

          with open("image_count.txt", "w") as f:
              f.write(str(len(files)))
          PY

      - name: Create thumbnail image
        env:
          THUMBNAIL_TITLE: ${{ github.event.inputs.thumbnail_title }}
          THUMBNAIL_SUBTITLE: ${{ github.event.inputs.thumbnail_subtitle }}
        run: |
          python - <<'PY'
          from PIL import Image, ImageDraw, ImageFont, ImageFilter
          import os, random

          title = os.environ.get("THUMBNAIL_TITLE", "").strip()
          subtitle = os.environ.get("THUMBNAIL_SUBTITLE", "").strip()
          job_id = "${{ github.event.inputs.job_id }}"

          if not title:
              raise Exception("thumbnail_title is empty")
          if not subtitle:
              raise Exception("thumbnail_subtitle is empty")

          W, H = 1280, 720
          bg_path = "input/scene1.png"

          img = Image.open(bg_path).convert("RGB")
          iw, ih = img.size
          scale = max(W / iw, H / ih)
          nw, nh = int(iw * scale), int(ih * scale)
          img = img.resize((nw, nh), Image.LANCZOS)
          img = img.crop(((nw - W) // 2, (nh - H) // 2, (nw + W) // 2, (nh + H) // 2))

          img = img.convert("RGBA")

          warm_overlay = Image.new("RGBA", (W, H), (255, 235, 190, 55))
          img = Image.alpha_composite(img, warm_overlay)

          draw = ImageDraw.Draw(img)

          title_font_path = "/usr/share/fonts/truetype/nanum/NanumGothicBold.ttf"
          subtitle_font_path = "/usr/share/fonts/truetype/nanum/NanumGothicBold.ttf"

          title_font = ImageFont.truetype(title_font_path, 120)

          title_y = 40
          chars = list(title)

          char_widths = []
          total_width = 0
          for ch in chars:
              box = draw.textbbox((0, 0), ch, font=title_font, stroke_width=6)
              w = box[2] - box[0]
              char_widths.append(w)
              total_width += w

          x = (W - total_width) // 2

          for i, ch in enumerate(chars):
              fill_color = (220, 42, 25, 255) if i >= max(len(chars) - 2, 0) else (20, 15, 10, 255)
              draw.text(
                  (x, title_y),
                  ch,
                  font=title_font,
                  fill=fill_color,
                  stroke_width=7,
                  stroke_fill=(247, 229, 190, 255)
              )
              x += char_widths[i]

          banner_y = 245
          banner_h = 115

          for _ in range(22):
              y = banner_y + random.randint(-20, 20)
              x1 = 70 + random.randint(-35, 20)
              x2 = W - 70 + random.randint(-20, 35)
              h = banner_h + random.randint(-28, 28)
              draw.rounded_rectangle(
                  [x1, y, x2, y + h],
                  radius=22,
                  fill=(20, 15, 10, 230)
              )

          subtitle = subtitle.replace(".", "").strip()

          max_width = 1080
          font_size = 72

          while font_size >= 58:
              sub_font = ImageFont.truetype(subtitle_font_path, font_size)
              box = draw.textbbox((0, 0), subtitle, font=sub_font, stroke_width=5)
              text_w = box[2] - box[0]
              if text_w <= max_width:
                  break
              font_size -= 4

          sub_font = ImageFont.truetype(subtitle_font_path, font_size)
          box = draw.textbbox((0, 0), subtitle, font=sub_font, stroke_width=5)
          text_w = box[2] - box[0]
          text_h = box[3] - box[1]
          sub_x = (W - text_w) // 2
          sub_y = banner_y + (banner_h - text_h) // 2 - 12

          words = subtitle.split(" ", 1)

          if len(words) == 2:
              first = words[0] + " "
              rest = words[1]

              first_box = draw.textbbox((0, 0), first, font=sub_font, stroke_width=5)
              first_w = first_box[2] - first_box[0]

              draw.text(
                  (sub_x, sub_y),
                  first,
                  font=sub_font,
                  fill=(255, 185, 20, 255),
                  stroke_width=5,
                  stroke_fill=(0, 0, 0, 255)
              )

              draw.text(
                  (sub_x + first_w, sub_y),
                  rest,
                  font=sub_font,
                  fill=(255, 255, 255, 255),
                  stroke_width=5,
                  stroke_fill=(0, 0, 0, 255)
              )
          else:
              draw.text(
                  (sub_x, sub_y),
                  subtitle,
                  font=sub_font,
                  fill=(255, 185, 20, 255),
                  stroke_width=5,
                  stroke_fill=(0, 0, 0, 255)
              )

          output_path = f"output/thumbnail_{job_id}.jpg"
          img.convert("RGB").save(output_path,format="JPEG",quality=92,optimize=True)         
          print(f"Thumbnail created: {output_path}")
          PY

      - name: Download TTS audio from Google Drive
        run: |
          python - <<'PY'
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaIoBaseDownload
          import io, time

          JOB_ID = "${{ github.event.inputs.job_id }}"
          AUDIO_FOLDER_ID = "${{ secrets.AUDIO_FOLDER_ID }}"

          SCOPES = ["https://www.googleapis.com/auth/drive"]
          creds = service_account.Credentials.from_service_account_file("service-account.json", scopes=SCOPES)
          drive = build("drive", "v3", credentials=creds)

          query = f"'{AUDIO_FOLDER_ID}' in parents and trashed=false and name contains '{JOB_ID}_voice'"

          files = []
          for attempt in range(1, 7):
              results = drive.files().list(
                  q=query,
                  fields="files(id,name,createdTime)",
                  pageSize=10
              ).execute()

              files = results.get("files", [])

              if files:
                  print(f"Found audio file on attempt {attempt}: {files[0]['name']}")
                  break

              print(f"No audio file found yet for job_id={JOB_ID}. Retry {attempt}/6...")
              time.sleep(5)

          if not files:
              raise Exception(f"No audio file found for job_id={JOB_ID}")

          files.sort(key=lambda f: f.get("createdTime", ""), reverse=True)
          file_id = files[0]["id"]

          request = drive.files().get_media(fileId=file_id)
          fh = io.FileIO("input/audio.mp3", "wb")
          downloader = MediaIoBaseDownload(fh, request)

          done = False
          while not done:
              status, done = downloader.next_chunk()

          print("Downloaded audio as input/audio.mp3")
          PY

      - name: Get audio duration
        run: |
          AUDIO_DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 input/audio.mp3)
          echo "$AUDIO_DURATION" > audio_duration.txt
          echo "Audio duration: $AUDIO_DURATION"

      - name: Create empty subtitle file
        run: |
          cat > input/subtitle.ass <<'EOF'
          [Script Info]
          ScriptType: v4.00+
          PlayResX: 1080
          PlayResY: 1920

          [V4+ Styles]
          Format: Name, Fontname, Fontsize, PrimaryColour, SecondaryColour, OutlineColour, BackColour, Bold, Italic, Underline, StrikeOut, ScaleX, ScaleY, Spacing, Angle, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding
          Style: Default,Nanum Brush Script,82,&H00FFFFFF,&H000000FF,&H00000000,&H80000000,1,0,0,0,100,100,0,0,1,5,2,2,70,70,210,1

          [Events]
          Format: Layer, Start, End, Style, Name, MarginL, MarginR, MarginV, Effect, Text
          EOF

      - name: Create image clips
        run: |
          IMAGE_COUNT=$(cat image_count.txt)
          AUDIO_DURATION=$(cat audio_duration.txt)

          CLIP_DURATION=$(python - <<PY
          image_count = int("$IMAGE_COUNT")
          audio_duration = float("$AUDIO_DURATION")
          print(max(audio_duration / image_count, 3))
          PY
          )

          echo "Image count: $IMAGE_COUNT"
          echo "Clip duration: $CLIP_DURATION"

          > clips/list.txt

          for i in $(seq 1 $IMAGE_COUNT); do
            ffmpeg -y \
              -loop 1 -t "$CLIP_DURATION" -i "input/scene${i}.png" \
              -vf "scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,setsar=1" \
              -r 30 \
              -c:v libx264 \
              -pix_fmt yuv420p \
              "clips/clip${i}.mp4"

            echo "file 'clip${i}.mp4'" >> clips/list.txt
          done

      - name: Concatenate clips and add TTS audio
        run: |
          ffmpeg -y \
            -f concat -safe 0 -i clips/list.txt \
            -i input/audio.mp3 \
            -map 0:v -map 1:a \
            -vf "ass=input/subtitle.ass" \
            -shortest \
            -c:v libx264 \
            -pix_fmt yuv420p \
            -c:a aac \
            output/short_${{ github.event.inputs.job_id }}.mp4

      - name: Upload mp4 and thumbnail to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: render-${{ github.event.inputs.job_id }}
          name: Render ${{ github.event.inputs.job_id }}
          files: |
            output/short_${{ github.event.inputs.job_id }}.mp4
            output/thumbnail_${{ github.event.inputs.job_id }}.jpg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
