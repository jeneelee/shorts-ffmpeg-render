name: Render Shorts Video

on:
  workflow_dispatch:
    inputs:
      job_id:
        required: true
      thumbnail_title:
        required: true
      thumbnail_subtitle:
        required: true
      voice_script:
        required: true

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-cjk fonts-nanum
          pip install google-api-python-client google-auth pillow

      - name: Prepare folders
        run: |
          mkdir -p input clips output
          echo '${{ secrets.GCP_SERVICE_ACCOUNT }}' > service-account.json

      - name: Download images from Google Drive temp
        run: |
          python - <<'PY'
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaIoBaseDownload
          import io
          import os
          import re
          import time

          JOB_ID = "${{ github.event.inputs.job_id }}"
          TEMP_FOLDER_ID = "${{ secrets.TEMP_FOLDER_ID }}"
          EXPECTED_SCENES = 7
          MAX_ATTEMPTS = 12
          WAIT_SECONDS = 5

          SCOPES = ["https://www.googleapis.com/auth/drive"]

          creds = service_account.Credentials.from_service_account_file(
              "service-account.json",
              scopes=SCOPES
          )

          drive = build("drive", "v3", credentials=creds)

          query = (
              f"'{TEMP_FOLDER_ID}' in parents "
              f"and trashed=false "
              f"and name contains '{JOB_ID}_scene_'"
          )

          def scene_number(name):
              match = re.search(r"_scene_(\d+)", name)
              return int(match.group(1)) if match else None

          selected = {}

          for attempt in range(1, MAX_ATTEMPTS + 1):
              results = drive.files().list(
                  q=query,
                  fields="files(id,name,createdTime)",
                  pageSize=1000
              ).execute()

              files = results.get("files", [])
              selected = {}

              for file_info in files:
                  number = scene_number(file_info["name"])

                  if number is None:
                      continue

                  if not 1 <= number <= EXPECTED_SCENES:
                      continue

                  if number not in selected:
                      selected[number] = file_info
                      continue

                  old_created = selected[number].get("createdTime", "")
                  new_created = file_info.get("createdTime", "")

                  if new_created > old_created:
                      selected[number] = file_info

              found_numbers = sorted(selected.keys())

              print(
                  f"Attempt {attempt}/{MAX_ATTEMPTS}: "
                  f"found scenes {found_numbers} "
                  f"({len(found_numbers)}/{EXPECTED_SCENES})"
              )

              if len(selected) == EXPECTED_SCENES:
                  print("All 7 scene images found.")
                  break

              missing = [
                  number
                  for number in range(1, EXPECTED_SCENES + 1)
                  if number not in selected
              ]

              print(
                  f"Missing scenes: {missing}. "
                  f"Waiting {WAIT_SECONDS} seconds..."
              )

              time.sleep(WAIT_SECONDS)

          if len(selected) != EXPECTED_SCENES:
              missing = [
                  number
                  for number in range(1, EXPECTED_SCENES + 1)
                  if number not in selected
              ]

              raise Exception(
                  f"Expected {EXPECTED_SCENES} scene images, "
                  f"but found {len(selected)}. "
                  f"Missing scenes: {missing}. "
                  f"job_id={JOB_ID}"
              )

          os.makedirs("input", exist_ok=True)

          for scene_idx in range(1, EXPECTED_SCENES + 1):
              file_info = selected[scene_idx]
              output_path = f"input/scene{scene_idx}.png"

              print(
                  f"Downloading image: "
                  f"{file_info['name']} -> {output_path}"
              )

              request = drive.files().get_media(
                  fileId=file_info["id"]
              )

              file_handle = io.FileIO(output_path, "wb")

              downloader = MediaIoBaseDownload(
                  file_handle,
                  request
              )

              done = False

              while not done:
                  status, done = downloader.next_chunk()

          with open("image_count.txt", "w", encoding="utf-8") as file:
              file.write(str(EXPECTED_SCENES))

          print("Downloaded all 7 scene images successfully.")
          PY

      - name: Create thumbnail image
        env:
          THUMBNAIL_TITLE: ${{ github.event.inputs.thumbnail_title }}
          THUMBNAIL_SUBTITLE: ${{ github.event.inputs.thumbnail_subtitle }}
        run: |
          python - <<'PY'
          from PIL import Image, ImageDraw, ImageFont
          import os
          import random

          title = os.environ.get(
              "THUMBNAIL_TITLE",
              ""
          ).strip()

          subtitle = os.environ.get(
              "THUMBNAIL_SUBTITLE",
              ""
          ).strip()

          job_id = "${{ github.event.inputs.job_id }}"

          if not title:
              raise Exception("thumbnail_title is empty")

          if not subtitle:
              raise Exception("thumbnail_subtitle is empty")

          width = 1280
          height = 720

          # 마지막 장면을 썸네일 배경으로 사용
          background_path = "input/scene7.png"

          image = Image.open(background_path).convert("RGB")

          original_width, original_height = image.size

          scale = max(
              width / original_width,
              height / original_height
          )

          resized_width = int(original_width * scale)
          resized_height = int(original_height * scale)

          image = image.resize(
              (resized_width, resized_height),
              Image.LANCZOS
          )

          left = (resized_width - width) // 2
          top = (resized_height - height) // 2
          right = left + width
          bottom = top + height

          image = image.crop(
              (left, top, right, bottom)
          )

          image = image.convert("RGBA")

          warm_overlay = Image.new(
              "RGBA",
              (width, height),
              (255, 235, 190, 55)
          )

          image = Image.alpha_composite(
              image,
              warm_overlay
          )

          draw = ImageDraw.Draw(image)

          title_font_path = (
              "/usr/share/fonts/truetype/nanum/"
              "NanumGothicBold.ttf"
          )

          subtitle_font_path = (
              "/usr/share/fonts/truetype/nanum/"
              "NanumGothicBold.ttf"
          )

          title_font = ImageFont.truetype(
              title_font_path,
              120
          )

          title_y = 40
          characters = list(title)

          character_widths = []
          total_width = 0

          for character in characters:
              box = draw.textbbox(
                  (0, 0),
                  character,
                  font=title_font,
                  stroke_width=6
              )

              character_width = box[2] - box[0]
              character_widths.append(character_width)
              total_width += character_width

          title_x = (width - total_width) // 2

          for index, character in enumerate(characters):
              if index >= max(len(characters) - 2, 0):
                  fill_color = (220, 42, 25, 255)
              else:
                  fill_color = (20, 15, 10, 255)

              draw.text(
                  (title_x, title_y),
                  character,
                  font=title_font,
                  fill=fill_color,
                  stroke_width=7,
                  stroke_fill=(247, 229, 190, 255)
              )

              title_x += character_widths[index]

          banner_y = 235
          banner_height = 110

          for _ in range(22):
              random_y = banner_y + random.randint(-20, 20)
              x1 = 70 + random.randint(-35, 20)
              x2 = width - 70 + random.randint(-20, 35)
              rectangle_height = (
                  banner_height + random.randint(-28, 28)
              )

              draw.rounded_rectangle(
                  [
                      x1,
                      random_y,
                      x2,
                      random_y + rectangle_height
                  ],
                  radius=22,
                  fill=(20, 15, 10, 230)
              )

          subtitle = subtitle.replace(".", "").strip()

          max_subtitle_width = 1080
          subtitle_font_size = 68

          while subtitle_font_size >= 58:
              subtitle_font = ImageFont.truetype(
                  subtitle_font_path,
                  subtitle_font_size
              )

              box = draw.textbbox(
                  (0, 0),
                  subtitle,
                  font=subtitle_font,
                  stroke_width=5
              )

              subtitle_width = box[2] - box[0]

              if subtitle_width <= max_subtitle_width:
                  break

              subtitle_font_size -= 4

          subtitle_font = ImageFont.truetype(
              subtitle_font_path,
              subtitle_font_size
          )

          box = draw.textbbox(
              (0, 0),
              subtitle,
              font=subtitle_font,
              stroke_width=5
          )

          subtitle_width = box[2] - box[0]
          subtitle_height = box[3] - box[1]

          subtitle_x = (width - subtitle_width) // 2

          subtitle_y = (
              banner_y
              + (banner_height - subtitle_height) // 2
              - 12
          )

          words = subtitle.split(" ", 1)

          if len(words) == 2:
              first_word = words[0] + " "
              remaining_text = words[1]

              first_box = draw.textbbox(
                  (0, 0),
                  first_word,
                  font=subtitle_font,
                  stroke_width=5
              )

              first_width = first_box[2] - first_box[0]

              draw.text(
                  (subtitle_x, subtitle_y),
                  first_word,
                  font=subtitle_font,
                  fill=(255, 185, 20, 255),
                  stroke_width=5,
                  stroke_fill=(0, 0, 0, 255)
              )

              draw.text(
                  (subtitle_x + first_width, subtitle_y),
                  remaining_text,
                  font=subtitle_font,
                  fill=(255, 255, 255, 255),
                  stroke_width=5,
                  stroke_fill=(0, 0, 0, 255)
              )

          else:
              draw.text(
                  (subtitle_x, subtitle_y),
                  subtitle,
                  font=subtitle_font,
                  fill=(255, 185, 20, 255),
                  stroke_width=5,
                  stroke_fill=(0, 0, 0, 255)
              )

          output_path = (
              f"output/thumbnail_{job_id}.jpg"
          )

          image.convert("RGB").save(
              output_path,
              format="JPEG",
              quality=92,
              optimize=True
          )

          print(f"Thumbnail created: {output_path}")
          PY

      - name: Download TTS audio from Google Drive
        run: |
          python - <<'PY'
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaIoBaseDownload
          import io
          import time

          JOB_ID = "${{ github.event.inputs.job_id }}"
          AUDIO_FOLDER_ID = "${{ secrets.AUDIO_FOLDER_ID }}"

          SCOPES = ["https://www.googleapis.com/auth/drive"]

          creds = service_account.Credentials.from_service_account_file(
              "service-account.json",
              scopes=SCOPES
          )

          drive = build("drive", "v3", credentials=creds)

          query = (
              f"'{AUDIO_FOLDER_ID}' in parents "
              f"and trashed=false "
              f"and name contains '{JOB_ID}_voice'"
          )

          files = []

          for attempt in range(1, 7):
              results = drive.files().list(
                  q=query,
                  fields="files(id,name,createdTime)",
                  pageSize=10
              ).execute()

              files = results.get("files", [])

              if files:
                  print(
                      f"Found audio file on attempt "
                      f"{attempt}: {files[0]['name']}"
                  )
                  break

              print(
                  f"No audio file found yet for "
                  f"job_id={JOB_ID}. Retry {attempt}/6..."
              )

              time.sleep(5)

          if not files:
              raise Exception(
                  f"No audio file found for job_id={JOB_ID}"
              )

          files.sort(
              key=lambda file_info: file_info.get(
                  "createdTime",
                  ""
              ),
              reverse=True
          )

          file_id = files[0]["id"]

          request = drive.files().get_media(
              fileId=file_id
          )

          file_handle = io.FileIO(
              "input/audio.mp3",
              "wb"
          )

          downloader = MediaIoBaseDownload(
              file_handle,
              request
          )

          done = False

          while not done:
              status, done = downloader.next_chunk()

          print("Downloaded audio as input/audio.mp3")
          PY

      - name: Get audio duration
        run: |
          AUDIO_DURATION=$(ffprobe \
            -v error \
            -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 \
            input/audio.mp3)

          echo "$AUDIO_DURATION" > audio_duration.txt
          echo "Audio duration: $AUDIO_DURATION"

      - name: Generate subtitle.ass from voice_script
        env:
          VOICE_SCRIPT: ${{ github.event.inputs.voice_script }}
          THUMBNAIL_TITLE: ${{ github.event.inputs.thumbnail_title }}
        run: |
          python - <<'PY'
          import os
          import re

          raw_script = os.environ.get(
              "VOICE_SCRIPT",
              ""
          ).strip()

          title_word = os.environ.get(
              "THUMBNAIL_TITLE",
              ""
          ).strip()

          if not raw_script:
              raise Exception("voice_script input is empty")

          with open(
              "audio_duration.txt",
              "r",
              encoding="utf-8"
          ) as file:
              audio_duration = float(
                  file.read().strip()
              )

          def clean_text(text):
              text = re.sub(
                  r"\[\d+\s*-\s*\d+초\]",
                  "",
                  text
              )

              text = text.replace("\r", "\n")
              text = re.sub(r"\n{2,}", "\n", text)

              return text.strip()

          def split_sentences(text):
              lines = [
                  line.strip()
                  for line in text.split("\n")
                  if line.strip()
              ]

              result = []

              for line in lines:
                  parts = re.split(
                      r"(?<=[.!?。！？])\s*",
                      line
                  )

                  for part in parts:
                      part = part.strip()

                      if part:
                          result.append(part)

              return result

          def split_korean_chunk(
              sentence,
              max_chars=20
          ):
              sentence = sentence.strip()

              if len(sentence) <= max_chars:
                  return [sentence]

              words = sentence.split()
              chunks = []
              current = ""

              if len(words) > 1:
                  for word in words:
                      candidate = (
                          current + " " + word
                      ).strip()

                      if len(candidate) <= max_chars:
                          current = candidate
                      else:
                          if current:
                              chunks.append(current)

                          current = word

                  if current:
                      chunks.append(current)

              else:
                  chunks = [
                      sentence[index:index + max_chars]
                      for index in range(
                          0,
                          len(sentence),
                          max_chars
                      )
                  ]

              final_chunks = []

              for chunk in chunks:
                  if len(chunk) <= max_chars:
                      final_chunks.append(chunk)
                  else:
                      final_chunks.extend(
                          [
                              chunk[index:index + max_chars]
                              for index in range(
                                  0,
                                  len(chunk),
                                  max_chars
                              )
                          ]
                      )

              return final_chunks

          def make_caption_text(chunk):
              chunk = chunk.strip()

              # 16자 이하는 한 줄로 유지
              if len(chunk) <= 16:
                  return chunk

              words = chunk.split()

              # 가능한 경우 띄어쓰기 기준으로
              # 가장 균형 잡힌 두 줄을 선택
              if len(words) >= 2:
                  best_line1 = ""
                  best_line2 = ""
                  smallest_difference = 999

                  for index in range(1, len(words)):
                      line1 = " ".join(words[:index])
                      line2 = " ".join(words[index:])

                      if (
                          len(line1) <= 16
                          and len(line2) <= 16
                      ):
                          difference = abs(
                              len(line1) - len(line2)
                          )

                          if (
                              difference
                              < smallest_difference
                          ):
                              smallest_difference = difference
                              best_line1 = line1
                              best_line2 = line2

                  if best_line1 and best_line2:
                      return (
                          best_line1
                          + r"\N"
                          + best_line2
                      )

              # 띄어쓰기 기준 분할이 불가능하면
              # 글자 중간을 기준으로 분할
              middle = len(chunk) // 2

              return (
                  chunk[:middle].strip()
                  + r"\N"
                  + chunk[middle:].strip()
              )

          def ass_time(seconds):
              seconds = max(0, float(seconds))

              hours = int(seconds // 3600)

              minutes = int(
                  (seconds % 3600) // 60
              )

              whole_seconds = int(seconds % 60)

              centiseconds = int(
                  round(
                      (
                          seconds
                          - int(seconds)
                      ) * 100
                  )
              )

              if centiseconds >= 100:
                  whole_seconds += 1
                  centiseconds = 0

              return (
                  f"{hours}:"
                  f"{minutes:02}:"
                  f"{whole_seconds:02}."
                  f"{centiseconds:02}"
              )

          def escape_ass(text):
              return (
                  text
                  .replace("{", "")
                  .replace("}", "")
              )

          def highlight(text):
              if title_word and title_word in text:
                  return text.replace(
                      title_word,
                      (
                          r"{\c&H00B9FFFF&}"
                          + title_word
                          + r"{\c&H00FFFFFF&}"
                      )
                  )

              return text

          script = clean_text(raw_script)
          sentences = split_sentences(script)

          chunks = []

          for sentence in sentences:
              chunks.extend(
                  split_korean_chunk(
                      sentence,
                      max_chars=20
                  )
              )

          chunks = [
              chunk.strip()
              for chunk in chunks
              if chunk.strip()
          ]

          if not chunks:
              raise Exception(
                  "No subtitle chunks generated"
              )

          weights = [
              max(
                  len(
                      re.sub(
                          r"\s+",
                          "",
                          chunk
                      )
                  ),
                  4
              )
              for chunk in chunks
          ]

          total_weight = sum(weights)

          minimum_duration = 0.75
          gap = 0.03

          total_gap_duration = (
              gap * (len(chunks) - 1)
          )

          usable_duration = max(
              audio_duration - total_gap_duration,
              len(chunks) * minimum_duration
          )

          raw_durations = [
              usable_duration
              * (weight / total_weight)
              for weight in weights
          ]

          durations = [
              max(minimum_duration, duration)
              for duration in raw_durations
          ]

          calculated_total = (
              sum(durations)
              + total_gap_duration
          )

          if calculated_total > audio_duration:
              scale = (
                  audio_duration
                  / calculated_total
              )

              durations = [
                  duration * scale
                  for duration in durations
              ]

          with open(
              "input/subtitle.ass",
              "w",
              encoding="utf-8"
          ) as file:
              file.write("[Script Info]\n")
              file.write("ScriptType: v4.00+\n")
              file.write("PlayResX: 1080\n")
              file.write("PlayResY: 1920\n\n")

              file.write("[V4+ Styles]\n")

              file.write(
                  "Format: Name, Fontname, Fontsize, "
                  "PrimaryColour, SecondaryColour, "
                  "OutlineColour, BackColour, Bold, "
                  "Italic, Underline, StrikeOut, "
                  "ScaleX, ScaleY, Spacing, Angle, "
                  "BorderStyle, Outline, Shadow, "
                  "Alignment, MarginL, MarginR, "
                  "MarginV, Encoding\n"
              )

              file.write(
                  "Style: Default,NanumGothicBold,92,"
                  "&H00FFFFFF,&H000000FF,&H00000000,"
                  "&H80000000,1,0,0,0,100,100,0,0,"
                  "1,7,2,2,70,70,250,1\n\n"
              )

              file.write("[Events]\n")

              file.write(
                  "Format: Layer, Start, End, Style, "
                  "Name, MarginL, MarginR, MarginV, "
                  "Effect, Text\n"
              )

              current_time = 0.0

              for index, chunk in enumerate(chunks):
                  start = current_time

                  end = min(
                      start + durations[index],
                      audio_duration
                  )

                  if index == len(chunks) - 1:
                      end = audio_duration

                  if end <= start:
                      break

                  caption_text = make_caption_text(
                      chunk
                  )

                  caption_text = escape_ass(
                      caption_text
                  )

                  caption_text = highlight(
                      caption_text
                  )

                  file.write(
                      "Dialogue: 0,"
                      f"{ass_time(start)},"
                      f"{ass_time(end)},"
                      "Default,,0,0,0,,"
                      f"{caption_text}\n"
                  )

                  current_time = end + gap

                  if current_time >= audio_duration:
                      break

          print(
              f"subtitle.ass created: "
              f"{len(chunks)} captions, "
              f"audio_duration={audio_duration}"
          )
          PY

      - name: Create image clips
        run: |
          IMAGE_COUNT=$(cat image_count.txt)
          AUDIO_DURATION=$(cat audio_duration.txt)

          CLIP_DURATION=$(python - <<PY
          image_count = int("$IMAGE_COUNT")
          audio_duration = float("$AUDIO_DURATION")
          print(max(audio_duration / image_count, 3))
          PY
          )

          echo "Image count: $IMAGE_COUNT"
          echo "Clip duration: $CLIP_DURATION"

          > clips/list.txt

          for i in $(seq 1 "$IMAGE_COUNT"); do
            ffmpeg -y \
              -loop 1 \
              -t "$CLIP_DURATION" \
              -i "input/scene${i}.png" \
              -vf "scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,setsar=1" \
              -r 30 \
              -c:v libx264 \
              -pix_fmt yuv420p \
              "clips/clip${i}.mp4"

            echo "file 'clip${i}.mp4'" >> clips/list.txt
          done

      - name: Concatenate clips and add TTS audio
        run: |
          ffmpeg -y \
            -f concat \
            -safe 0 \
            -i clips/list.txt \
            -i input/audio.mp3 \
            -map 0:v \
            -map 1:a \
            -vf "ass=input/subtitle.ass" \
            -shortest \
            -c:v libx264 \
            -pix_fmt yuv420p \
            -c:a aac \
            output/short_${{ github.event.inputs.job_id }}.mp4

      - name: Upload mp4 and thumbnail to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: render-${{ github.event.inputs.job_id }}
          name: Render ${{ github.event.inputs.job_id }}
          files: |
            output/short_${{ github.event.inputs.job_id }}.mp4
            output/thumbnail_${{ github.event.inputs.job_id }}.jpg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
