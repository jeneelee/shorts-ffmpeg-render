name: Render Shorts Video

on:
  workflow_dispatch:
    inputs:
      job_id:
        required: true
      scene1_id:
        required: true
      scene2_id:
        required: true
      scene3_id:
        required: true
      scene4_id:
        required: true
      scene5_id:
        required: true
      audio_id:
        required: false
      output_folder_id:
        required: true

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install google-api-python-client google-auth

      - name: Prepare files
        run: |
          mkdir -p input output
          echo '${{ secrets.GCP_SERVICE_ACCOUNT }}' > service-account.json

      - name: Download files from Google Drive
        run: |
          python - <<'PY'
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaIoBaseDownload
          import io

          SCOPES = ["https://www.googleapis.com/auth/drive"]
          creds = service_account.Credentials.from_service_account_file(
              "service-account.json", scopes=SCOPES
          )
          drive = build("drive", "v3", credentials=creds)

          files = {
              "input/scene1.png": "${{ github.event.inputs.scene1_id }}",
              "input/scene2.png": "${{ github.event.inputs.scene2_id }}",
              "input/scene3.png": "${{ github.event.inputs.scene3_id }}",
              "input/scene4.png": "${{ github.event.inputs.scene4_id }}",
              "input/scene5.png": "${{ github.event.inputs.scene5_id }}",
          }

          audio_id = "${{ github.event.inputs.audio_id }}"
          if audio_id:
              files["input/audio.mp3"] = audio_id

          for path, file_id in files.items():
              request = drive.files().get_media(fileId=file_id)
              fh = io.FileIO(path, "wb")
              downloader = MediaIoBaseDownload(fh, request)
              done = False
              while not done:
                  status, done = downloader.next_chunk()
          PY

      - name: Create silent audio if missing
        run: |
          if [ ! -f input/audio.mp3 ]; then
            ffmpeg -f lavfi -i anullsrc=r=44100:cl=mono -t 15 -q:a 9 -acodec libmp3lame input/audio.mp3
          fi

      - name: Render video
        run: |
          ffmpeg \
            -loop 1 -t 3 -i input/scene1.png \
            -loop 1 -t 3 -i input/scene2.png \
            -loop 1 -t 3 -i input/scene3.png \
            -loop 1 -t 3 -i input/scene4.png \
            -loop 1 -t 3 -i input/scene5.png \
            -i input/audio.mp3 \
            -filter_complex "\
            [0:v]scale=1080:1920,setsar=1[v0];\
            [1:v]scale=1080:1920,setsar=1[v1];\
            [2:v]scale=1080:1920,setsar=1[v2];\
            [3:v]scale=1080:1920,setsar=1[v3];\
            [4:v]scale=1080:1920,setsar=1[v4];\
            [v0][v1][v2][v3][v4]concat=n=5:v=1:a=0[v]" \
            -map "[v]" -map 5:a \
            -shortest \
            -r 30 \
            -c:v libx264 \
            -pix_fmt yuv420p \
            -c:a aac \
            output/short_${{ github.event.inputs.job_id }}.mp4

      - name: Upload video to Google Drive
        run: |
          python - <<'PY'
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          SCOPES = ["https://www.googleapis.com/auth/drive"]
          creds = service_account.Credentials.from_service_account_file(
              "service-account.json", scopes=SCOPES
          )
          drive = build("drive", "v3", credentials=creds)

          job_id = "${{ github.event.inputs.job_id }}"
          folder_id = "${{ github.event.inputs.output_folder_id }}"
          file_path = f"output/short_{job_id}.mp4"

          metadata = {
              "name": f"short_{job_id}.mp4",
              "parents": [folder_id]
          }

          media = MediaFileUpload(file_path, mimetype="video/mp4", resumable=True)
          uploaded = drive.files().create(
              body=metadata,
              media_body=media,
              fields="id,name,webViewLink"
          ).execute()

          print("Uploaded:", uploaded)
          PY
