name: Render Shorts Video

on:
  workflow_dispatch:
    inputs:
      job_id:
        required: true
      thumbnail_title:
        required: true
      thumbnail_subtitle:
        required: true
      voice_script:
        required: true

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-cjk fonts-nanum
          pip install google-api-python-client google-auth pillow

      - name: Prepare folders
        run: |
          mkdir -p input clips output
          echo '${{ secrets.GCP_SERVICE_ACCOUNT }}' > service-account.json

      - name: Download images from Google Drive temp
        run: |
          python - <<'PY'
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaIoBaseDownload
          import io, re, time, os

          JOB_ID = "${{ github.event.inputs.job_id }}"
          TEMP_FOLDER_ID = "${{ secrets.TEMP_FOLDER_ID }}"
          EXPECTED_SCENES = 7

          SCOPES = ["https://www.googleapis.com/auth/drive"]
          creds = service_account.Credentials.from_service_account_file("service-account.json", scopes=SCOPES)
          drive = build("drive", "v3", credentials=creds)

          query = f"'{TEMP_FOLDER_ID}' in parents and trashed=false and name contains '{JOB_ID}_scene_'"

          def scene_number(name):
              m = re.search(r"_scene_(\d+)", name)
              return int(m.group(1)) if m else None

          selected = {}

          for attempt in range(1, 13):
              results = drive.files().list(
                  q=query,
                  fields="files(id,name,createdTime)",
                  pageSize=1000
              ).execute()

              files = results.get("files", [])

              selected = {}
              for f in files:
                  n = scene_number(f["name"])
                  if n is not None and 1 <= n <= EXPECTED_SCENES:
                      if n not in selected:
                          selected[n] = f
                      else:
                          old_time = selected[n].get("createdTime", "")
                          new_time = f.get("createdTime", "")
                          if new_time > old_time:
                              selected[n] = f

              found_numbers = sorted(selected.keys())
              print(f"Attempt {attempt}/12: found scenes {found_numbers} ({len(found_numbers)}/{EXPECTED_SCENES})")

              if len(selected) == EXPECTED_SCENES:
                  print("All 7 scene images found.")
                  break

              missing = [i for i in range(1, EXPECTED_SCENES + 1) if i not in selected]
              print(f"Missing scenes: {missing}. Waiting 5 seconds...")
              time.sleep(5)

          if len(selected) != EXPECTED_SCENES:
              missing = [i for i in range(1, EXPECTED_SCENES + 1) if i not in selected]
              raise Exception(f"Expected 7 scene images, but found {len(selected)}. Missing scenes: {missing}. job_id={JOB_ID}")

          os.makedirs("input", exist_ok=True)

          for scene_idx in range(1, EXPECTED_SCENES + 1):
              f = selected[scene_idx]
              path = f"input/scene{scene_idx}.png"
              print(f"Downloading image: {f['name']} -> {path}")

              request = drive.files().get_media(fileId=f["id"])
              fh = io.FileIO(path, "wb")
              downloader = MediaIoBaseDownload(fh, request)

              done = False
              while not done:
                  status, done = downloader.next_chunk()

          with open("image_count.txt", "w") as f:
              f.write(str(EXPECTED_SCENES))

          print("Downloaded all 7 scene images successfully.")
          PY

      - name: Create thumbnail image
        env:
          THUMBNAIL_TITLE: ${{ github.event.inputs.thumbnail_title }}
          THUMBNAIL_SUBTITLE: ${{ github.event.inputs.thumbnail_subtitle }}
        run: |
          python - <<'PY'
          from PIL import Image, ImageDraw, ImageFont
          import os, random

          title = os.environ.get("THUMBNAIL_TITLE", "").strip()
          subtitle = os.environ.get("THUMBNAIL_SUBTITLE", "").strip()
          job_id = "${{ github.event.inputs.job_id }}"

          if not title:
              raise Exception("thumbnail_title is empty")
          if not subtitle:
              raise Exception("thumbnail_subtitle is empty")

          W, H = 1280, 720
          bg_path = "input/scene1.png"

          img = Image.open(bg_path).convert("RGB")
          iw, ih = img.size
          scale = max(W / iw, H / ih)
          nw, nh = int(iw * scale), int(ih * scale)
          img = img.resize((nw, nh), Image.LANCZOS)
          img = img.crop(((nw - W) // 2, (nh - H) // 2, (nw + W) // 2, (nh + H) // 2))

          img = img.convert("RGBA")
          warm_overlay = Image.new("RGBA", (W, H), (255, 235, 190, 55))
          img = Image.alpha_composite(img, warm_overlay)

          draw = ImageDraw.Draw(img)

          title_font_path = "/usr/share/fonts/truetype/nanum/NanumGothicBold.ttf"
          subtitle_font_path = "/usr/share/fonts/truetype/nanum/NanumGothicBold.ttf"

          title_font = ImageFont.truetype(title_font_path, 120)
          title_y = 40
          chars = list(title)

          char_widths = []
          total_width = 0
          for ch in chars:
              box = draw.textbbox((0, 0), ch, font=title_font, stroke_width=6)
              w = box[2] - box[0]
              char_widths.append(w)
              total_width += w

          x = (W - total_width) // 2

          for i, ch in enumerate(chars):
              fill_color = (220, 42, 25, 255) if i >= max(len(chars) - 2, 0) else (20, 15, 10, 255)
              draw.text(
                  (x, title_y),
                  ch,
                  font=title_font,
                  fill=fill_color,
                  stroke_width=7,
                  stroke_fill=(247, 229, 190, 255)
              )
              x += char_widths[i]

          banner_y = 235
          banner_h = 110

          for _ in range(22):
              y = banner_y + random.randint(-20, 20)
              x1 = 70 + random.randint(-35, 20)
              x2 = W - 70 + random.randint(-20, 35)
              h = banner_h + random.randint(-28, 28)
              draw.rounded_rectangle(
                  [x1, y, x2, y + h],
                  radius=22,
                  fill=(20, 15, 10, 230)
              )

          subtitle = subtitle.replace(".", "").strip()

          max_width = 1080
          font_size = 68

          while font_size >= 58:
              sub_font = ImageFont.truetype(subtitle_font_path, font_size)
              box = draw.textbbox((0, 0), subtitle, font=sub_font, stroke_width=5)
              text_w = box[2] - box[0]
              if text_w <= max_width:
                  break
              font_size -= 4

          sub_font = ImageFont.truetype(subtitle_font_path, font_size)
          box = draw.textbbox((0, 0), subtitle, font=sub_font, stroke_width=5)
          text_w = box[2] - box[0]
          text_h = box[3] - box[1]
          sub_x = (W - text_w) // 2
          sub_y = banner_y + (banner_h - text_h) // 2 - 12

          words = subtitle.split(" ", 1)

          if len(words) == 2:
              first = words[0] + " "
              rest = words[1]
              first_box = draw.textbbox((0, 0), first, font=sub_font, stroke_width=5)
              first_w = first_box[2] - first_box[0]

              draw.text((sub_x, sub_y), first, font=sub_font, fill=(255, 185, 20, 255), stroke_width=5, stroke_fill=(0, 0, 0, 255))
              draw.text((sub_x + first_w, sub_y), rest, font=sub_font, fill=(255, 255, 255, 255), stroke_width=5, stroke_fill=(0, 0, 0, 255))
          else:
              draw.text((sub_x, sub_y), subtitle, font=sub_font, fill=(255, 185, 20, 255), stroke_width=5, stroke_fill=(0, 0, 0, 255))

          output_path = f"output/thumbnail_{job_id}.jpg"
          img.convert("RGB").save(output_path, format="JPEG", quality=92, optimize=True)
          print(f"Thumbnail created: {output_path}")
          PY

      - name: Download TTS audio from Google Drive
        run: |
          python - <<'PY'
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaIoBaseDownload
          import io, time

          JOB_ID = "${{ github.event.inputs.job_id }}"
          AUDIO_FOLDER_ID = "${{ secrets.AUDIO_FOLDER_ID }}"

          SCOPES = ["https://www.googleapis.com/auth/drive"]
          creds = service_account.Credentials.from_service_account_file("service-account.json", scopes=SCOPES)
          drive = build("drive", "v3", credentials=creds)

          query = f"'{AUDIO_FOLDER_ID}' in parents and trashed=false and name contains '{JOB_ID}_voice'"

          files = []
          for attempt in range(1, 7):
              results = drive.files().list(
                  q=query,
                  fields="files(id,name,createdTime)",
                  pageSize=10
              ).execute()

              files = results.get("files", [])

              if files:
                  print(f"Found audio file on attempt {attempt}: {files[0]['name']}")
                  break

              print(f"No audio file found yet for job_id={JOB_ID}. Retry {attempt}/6...")
              time.sleep(5)

          if not files:
              raise Exception(f"No audio file found for job_id={JOB_ID}")

          files.sort(key=lambda f: f.get("createdTime", ""), reverse=True)
          file_id = files[0]["id"]

          request = drive.files().get_media(fileId=file_id)
          fh = io.FileIO("input/audio.mp3", "wb")
          downloader = MediaIoBaseDownload(fh, request)

          done = False
          while not done:
              status, done = downloader.next_chunk()

          print("Downloaded audio as input/audio.mp3")
          PY

      - name: Get audio duration
        run: |
          AUDIO_DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 input/audio.mp3)
          echo "$AUDIO_DURATION" > audio_duration.txt
          echo "Audio duration: $AUDIO_DURATION"

      - name: Generate subtitle.ass from voice_script
        env:
          VOICE_SCRIPT: ${{ github.event.inputs.voice_script }}
          THUMBNAIL_TITLE: ${{ github.event.inputs.thumbnail_title }}
        run: |
          python - <<'PY'
          import os, re, math

          raw_script = os.environ.get("VOICE_SCRIPT", "").strip()
          title_word = os.environ.get("THUMBNAIL_TITLE", "").strip()

          if not raw_script:
              raise Exception("voice_script input is empty")

          with open("audio_duration.txt", "r", encoding="utf-8") as f:
              audio_duration = float(f.read().strip())

          def clean_text(text):
              text = re.sub(r"\[\d+\s*-\s*\d+초\]", "", text)
              text = text.replace("\r", "\n")
              text = re.sub(r"\n{2,}", "\n", text)
              text = text.strip()
              return text

          def split_sentences(text):
              lines = [line.strip() for line in text.split("\n") if line.strip()]
              result = []
              for line in lines:
                  parts = re.split(r"(?<=[.!?。！？])\s*", line)
                  for p in parts:
                      p = p.strip()
                      if p:
                          result.append(p)
              return result

          def split_korean_chunk(sentence, max_chars=15):
              sentence = sentence.strip()
              if len(sentence) <= max_chars:
                  return [sentence]

              words = sentence.split()
              chunks = []
              cur = ""

              if len(words) > 1:
                  for w in words:
                      test = (cur + " " + w).strip()
                      if len(test) <= max_chars:
                          cur = test
                      else:
                          if cur:
                              chunks.append(cur)
                          cur = w
                  if cur:
                      chunks.append(cur)
              else:
                  chunks = [sentence[i:i+max_chars] for i in range(0, len(sentence), max_chars)]

              final = []
              for c in chunks:
                  if len(c) <= max_chars:
                      final.append(c)
                  else:
                      final.extend([c[i:i+max_chars] for i in range(0, len(c), max_chars)])
              return final

          def make_caption_text(chunk):
              chunk = chunk.strip()
              if len(chunk) <= 9:
                  return chunk

              words = chunk.split()
              if len(words) >= 2:
                  mid = len(words) // 2
                  line1 = " ".join(words[:mid])
                  line2 = " ".join(words[mid:])
                  if len(line1) <= 12 and len(line2) <= 12:
                      return line1 + r"\N" + line2

              if len(chunk) > 12:
                  mid = len(chunk) // 2
                  return chunk[:mid].strip() + r"\N" + chunk[mid:].strip()

              return chunk

          def ass_time(seconds):
              seconds = max(0, float(seconds))
              h = int(seconds // 3600)
              m = int((seconds % 3600) // 60)
              s = int(seconds % 60)
              cs = int(round((seconds - int(seconds)) * 100))
              if cs >= 100:
                  s += 1
                  cs = 0
              return f"{h}:{m:02}:{s:02}.{cs:02}"

          def esc_ass(text):
              text = text.replace("{", "").replace("}", "")
              return text

          def highlight(text):
              if title_word and title_word in text:
                  return text.replace(title_word, r"{\c&H00B9FFFF&}" + title_word + r"{\c&H00FFFFFF&}")
              return text

          script = clean_text(raw_script)
          sentences = split_sentences(script)

          chunks = []
          for s in sentences:
              chunks.extend(split_korean_chunk(s, max_chars=15))

          chunks = [c.strip() for c in chunks if c.strip()]

          if not chunks:
              raise Exception("No subtitle chunks generated")

          weights = [max(len(re.sub(r"\s+", "", c)), 4) for c in chunks]
          total_weight = sum(weights)

          min_duration = 0.75
          gap = 0.03
          usable_duration = max(audio_duration - (gap * (len(chunks) - 1)), len(chunks) * min_duration)

          raw_durations = [usable_duration * (w / total_weight) for w in weights]
          durations = [max(min_duration, d) for d in raw_durations]

          total = sum(durations) + gap * (len(chunks) - 1)
          scale = audio_duration / total if total > audio_duration else 1.0
          durations = [d * scale for d in durations]

          with open("input/subtitle.ass", "w", encoding="utf-8") as f:
              f.write("[Script Info]\n")
              f.write("ScriptType: v4.00+\n")
              f.write("PlayResX: 1080\n")
              f.write("PlayResY: 1920\n\n")

              f.write("[V4+ Styles]\n")
              f.write("Format: Name, Fontname, Fontsize, PrimaryColour, SecondaryColour, OutlineColour, BackColour, Bold, Italic, Underline, StrikeOut, ScaleX, ScaleY, Spacing, Angle, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding\n")
              f.write("Style: Default,NanumGothicBold,92,&H00FFFFFF,&H000000FF,&H00000000,&H80000000,1,0,0,0,100,100,0,0,1,7,2,2,70,70,250,1\n\n")

              f.write("[Events]\n")
              f.write("Format: Layer, Start, End, Style, Name, MarginL, MarginR, MarginV, Effect, Text\n")

              t = 0.0
              for i, c in enumerate(chunks):
                  start = t + 0.05
                  end = start + durations[i]
                  if i == len(chunks) - 1:
                      end = audio_duration

                  text = make_caption_text(c)
                  text = esc_ass(text)
                  text = highlight(text)

                  f.write(f"Dialogue: 0,{ass_time(start)},{ass_time(end)},Default,,0,0,0,,{text}\n")
                  t = end + gap

          print(f"subtitle.ass created: {len(chunks)} captions, audio_duration={audio_duration}")
          PY

      - name: Create image clips
        run: |
          IMAGE_COUNT=$(cat image_count.txt)
          AUDIO_DURATION=$(cat audio_duration.txt)

          CLIP_DURATION=$(python - <<PY
          image_count = int("$IMAGE_COUNT")
          audio_duration = float("$AUDIO_DURATION")
          print(max(audio_duration / image_count, 3))
          PY
          )

          echo "Image count: $IMAGE_COUNT"
          echo "Clip duration: $CLIP_DURATION"

          > clips/list.txt

          for i in $(seq 1 $IMAGE_COUNT); do
            ffmpeg -y \
              -loop 1 -t "$CLIP_DURATION" -i "input/scene${i}.png" \
              -vf "scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,setsar=1" \
              -r 30 \
              -c:v libx264 \
              -pix_fmt yuv420p \
              "clips/clip${i}.mp4"

            echo "file 'clip${i}.mp4'" >> clips/list.txt
          done

      - name: Concatenate clips and add TTS audio
        run: |
          ffmpeg -y \
            -f concat -safe 0 -i clips/list.txt \
            -i input/audio.mp3 \
            -map 0:v -map 1:a \
            -vf "ass=input/subtitle.ass" \
            -shortest \
            -c:v libx264 \
            -pix_fmt yuv420p \
            -c:a aac \
            output/short_${{ github.event.inputs.job_id }}.mp4

      - name: Upload mp4 and thumbnail to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: render-${{ github.event.inputs.job_id }}
          name: Render ${{ github.event.inputs.job_id }}
          files: |
            output/short_${{ github.event.inputs.job_id }}.mp4
            output/thumbnail_${{ github.event.inputs.job_id }}.jpg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
